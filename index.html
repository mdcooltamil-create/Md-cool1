<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDNET Order Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #00897b; margin-bottom: 10px; }
        textarea { width: 100%; height: 200px; border: 2px solid #ddd; border-radius: 10px; padding: 15px; box-sizing: border-box; font-size: 14px; resize: vertical; }
        
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-save { background-color: #2ecc71; color: white; }
        .btn-print { background-color: #34495e; color: white; display: none; } /* முதலில் மறைத்து வைக்கப்படும் */
        .btn:hover { opacity: 0.9; }

        /* லேபிள் டிஸ்ப்ளே (திரையில் பார்க்க) */
        #previewArea { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 30px; 
            max-width: 800px; 
            margin-left: auto; 
            margin-right: auto;
        }

        .label-box { 
            border: 1px dashed #ccc; 
            background: white;
            padding: 15px; 
            text-align: left;
            min-height: 150px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }

        .bold-text { font-weight: bold; font-size: 16px; color: #000; }

        /* பிரிண்ட் எடுக்கும்போது மட்டும் */
        @media print {
            body * { visibility: hidden; }
            #previewArea, #previewArea * { visibility: visible; }
            #previewArea { 
                position: absolute; left: 0; top: 0; width: 100%; 
                grid-template-columns: 1fr 1fr; 
                display: grid !important;
            }
            .label-box { border: 1px solid #000; height: 250px; } /* பிரிண்ட் பேப்பரில் கட்டத்தின் அளவு */
            .btn, .container { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>MDNET Order Panel</h2>
    <p>விஜய்: 9488934686 | Website: mdnet.site</p>
    <textarea id="addressInput" placeholder="ஒவ்வொரு முகவரிக்கும் இடையில் ஒரு இடைவெளி (Empty Line) விட்டு பல முகவரிகளை இங்கே பேஸ்ட் செய்யவும்..."></textarea>
    
    <div class="button-group">
        <button class="btn btn-save" onclick="generatePreview()">சீட்டில் சேமி & லேபிள் காட்டு</button>
        <button id="printBtn" class="btn btn-print" onclick="window.print()">Print Labels</button>
    </div>
</div>

<div id="previewArea"></div>

<script>
    async function generatePreview() {
        const inputText = document.getElementById('addressInput').value.trim();
        if (!inputText) { alert("முகவரியை உள்ளிடவும்!"); return; }

        const previewArea = document.getElementById('previewArea');
        previewArea.innerHTML = ''; // பழைய லேபிள்களை நீக்க

        // முகவரிகளைப் பிரித்தல் (ஒவ்வொரு முகவரிக்கும் நடுவில் இரண்டு என்டர் (Double Newline) இருந்தால் அதை ஒரு தனி அட்ரஸாக எடுக்கும்)
        const addressList = inputText.split(/\n\s*\n/); 

        addressList.forEach(addressBlock => {
            if (addressBlock.trim()) {
                const lines = addressBlock.trim().split('\n');
                const name = lines[0] || "";
                const restOfAddress = lines.slice(1).join('<br>');
                
                // பின்கோடு மட்டும் தேடி தடிமனாக்க (6 இலக்க எண்)
                const pincodeMatch = addressBlock.match(/\d{6}/);
                const pincode = pincodeMatch ? pincodeMatch[0] : "";

                const labelHTML = `
                    <div class="label-box">
                        <strong>TO : </strong> <span class="bold-text">${name}</span><br>
                        ${restOfAddress.replace(pincode, `<span class="bold-text">${pincode}</span>`)}
                    </div>
                `;
                previewArea.innerHTML += labelHTML;
            }
        });

        // கூகுள் ஷீட்டிற்கு அனுப்ப (முந்தைய ஸ்கிரிப்ட் URL இருந்தால் இங்கே பயன்படுத்தவும்)
        saveToSheet(inputText);

        // பிரிண்ட் பட்டனை காண்பிக்க
        document.getElementById('printBtn').style.display = 'block';
    }

    function saveToSheet(data) {
        const scriptURL = 'உங்கள்_APPS_SCRIPT_URL_இங்கே'; 
        if(scriptURL !== 'உங்கள்_APPS_SCRIPT_URL_இங்கே') {
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: `address=${encodeURIComponent(data)}`
            });
        }
    }
</script>

</body>
</html>
