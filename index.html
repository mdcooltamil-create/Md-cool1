   <!DOCTYPE html>
<html>
<head>
<title>My Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    body { text-align:center; font-family:Arial; padding: 20px; background-color: #f9f9f9; }
    .page { display: none; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 300px; margin: auto; }
    #page1 { display: block; } /* முதல் பக்கம் மட்டும் தெரியும்படி */
    button { padding:10px 20px; background:green; color:white; border:none; border-radius:5px; cursor:pointer; margin-top:10px; }
    input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
</style>
</head>

<body>

<div id="page1" class="page">
    <h2>🛍️ Welcome to Our Shop</h2>
    <p>Best Products at Low Price</p>
    <button onclick="showPage('page2')">View Product</button>
</div>

<div id="page2" class="page">
    <h2>📦 Product Details</h2>
    <p>Product Name: T-Shirt</p>
    <p>Price: ₹499</p>
    <button onclick="showPage('page3')">Order Now</button>
</div>

<div id="page3" class="page">
    <h2>🧾 Enter Details</h2>
    <input id="name" placeholder="Name"><br>
    <input id="address" placeholder="Address"><br>
    <button onclick="sendOrder()">Confirm on WhatsApp</button>
</div>

<script>
function showPage(pageId) {
    // அனைத்து பக்கங்களையும் மறைக்க
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "none";
    document.getElementById("page3").style.display = "none";
    
    // தேவையான பக்கத்தை மட்டும் காட்ட
    document.getElementById(pageId).style.display = "block";
}

function sendOrder() {
    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let msg = "Order Details:%0A" + "Name: " + name + "%0A" + "Address: " + address;
    window.open("https://wa.me/919488934686?text=" + msg);
}
</script>

</body>
</html>
