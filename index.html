<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDNET Order Manager</title>
    <style>
        :root { --primary: #25D366; --dark: #128C7E; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        h2 { color: var(--dark); margin: 0; }
        .brand { font-size: 14px; color: #666; margin-top: 5px; }
        textarea { width: 100%; height: 160px; border: 1px solid #ccc; border-radius: 10px; padding: 12px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(37,211,102,0.2); }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-save:hover { background: var(--dark); }
        #status { text-align: center; margin-top: 15px; font-weight: 500; }

        /* லேபிள் டிசைன் */
        #labelBox { display:none; margin-top: 25px; border: 2px solid #000; padding: 15px; background: #fff; position: relative; }
        .label-title { border-bottom: 1.5px solid #000; font-weight: bold; text-align: center; margin-bottom: 10px; padding-bottom: 5px; }
        .label-content p { margin: 5px 0; font-size: 14.5px; line-height: 1.3; }
        .label-brand { position: absolute; top: 45px; right: 15px; text-align: right; font-weight: bold; border: 1px solid #000; padding: 5px; }
        .btn-print { background: #3498db; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; margin-top: 10px; cursor: pointer; }
        
        @media print {
            body * { visibility: hidden; }
            #labelBox, #labelBox * { visibility: visible; }
            #labelBox { position: absolute; left: 0; top: 0; width: 100%; border: none; }
            .btn-print { display: none; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>MDNET Order Panel</h2>
        <div class="brand">விஜய்: <b>9488934686</b> | Website: <b>mdnet.site</b></div>
    </div>
    
    <textarea id="orderInput" placeholder="வாட்ஸ்அப் மெசேஜை இங்கே பேஸ்ட் செய்யவும்..."></textarea>
    <button class="btn-save" onclick="saveOrder()">சீட்டில் சேமி & லேபிள் காட்டு</button>
    <div id="status"></div>

    <div id="labelBox">
        <div class="label-title">SHIPPING LABEL</div>
        <div class="label-brand">MDNET<br><small>9488934686</small></div>
        <div class="label-content">
            <p><strong>To:</strong> <span id="l_name"></span></p>
            <p><strong>Address:</strong> <span id="l_addr"></span></p>
            <p><strong>Landmark:</strong> <span id="l_land"></span></p>
            <p><strong>State:</strong> <span id="l_state"></span> - <span id="l_pin"></span></p>
            <p><strong>Phone:</strong> <span id="l_ph"></span></p>
        </div>
        <button class="btn-print" onclick="window.print()">லேபிளை பிரிண்ட் செய்</button>
    </div>
</div>

<script>
    // உங்கள் கூகுள் ஸ்கிரிப்ட் URL இங்கே இணைக்கப்பட்டுள்ளது
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8GORBOaqfxMgdZgVJexu4Tr6LUVcR_8FuUUhd-52wTnPzi5dvIrELI1AJ5n6JxCKz/exec";

    function saveOrder() {
        const text = document.getElementById('orderInput').value;
        const status = document.getElementById('status');
        
        if(!text.trim()) {
            status.style.color = "red";
            status.innerText = "மெசேஜை உள்ளிடவும்!";
            return;
        }

        status.style.color = "orange";
        status.innerText = "சேமிக்கப்படுகிறது... Autocrat லேபிள் தயாராக ஒரு நிமிடம் ஆகும்.";

        // லேபிளில் தகவல்களைக் காட்டுதல்
        const find = (reg) => (text.match(reg) ? text.match(reg)[1].trim() : "---");
        
        document.getElementById('l_name').innerText = find(/\*Name:\*\s*(.*)/);
        document.getElementById('l_addr').innerText = find(/\*Address:\*\s*(.*)/);
        document.getElementById('l_land').innerText = find(/\*Landmark:\*\s*(.*)/);
        document.getElementById('l_pin').innerText = find(/\*Pincode:\*\s*(.*)/);
        document.getElementById('l_state').innerText = find(/\*State:\*\s*(.*)/);
        document.getElementById('l_ph').innerText = find(/\*Mobile:\*\s*(.*)/);
        
        document.getElementById('labelBox').style.display = "block";

        // Google Sheet-க்கு அனுப்புதல்
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        }).then(() => {
            status.style.color = "green";
            status.innerText = "ஆர்டர் வெற்றிகரமாக சேமிக்கப்பட்டது!";
        }).catch(() => {
            status.style.color = "red";
            status.innerText = "பிழை! மீண்டும் முயற்சிக்கவும்.";
        });
    }
</script>

</body>
</html>
