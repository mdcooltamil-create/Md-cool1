<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDNET Order Panel</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; text-align: center; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #00897b; margin-bottom: 5px; }
        textarea { width: 100%; height: 180px; border: 2px solid #ddd; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 15px; margin-top: 15px; }
        .btn { background-color: #2ecc71; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 17px; margin-top: 20px; font-weight: bold; width: 100%; }
        
        /* பிரிண்ட் டிசைன் */
        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: grid; grid-template-columns: 1fr 1fr; width: 100%; position: absolute; left: 0; top: 0; }
            .label-box { border: 0.5px solid #ccc; padding: 20px; height: 220px; box-sizing: border-box; font-size: 16px; line-height: 1.5; }
            .bold-text { font-weight: bold; font-size: 19px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>MDNET Order Panel</h2>
    <p>விஜய்: 9488934686 | Website: mdnet.site</p>
    <textarea id="addressInput" placeholder="முகவரியை இங்கே பேஸ்ட் செய்யவும்..."></textarea>
    <button class="btn" onclick="processOrder()">சீட்டில் சேமி & லேபிள் காட்டு</button>
</div>

<div id="printArea"></div>

<script>
    async function processOrder() {
        const fullAddress = document.getElementById('addressInput').value;
        if (!fullAddress.trim()) { alert("முகவரியை உள்ளிடவும்!"); return; }

        // 1. கூகுள் ஷீட்டிற்கு அனுப்புதல்
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzgLqneimvHouQP1pUGgb4haCyRF9z43JZ-wmWuAW8PfbPrEb3I5y1ukv7N5j-ciAir/exec'; // உங்கள் URL-ஐ இங்கே மாற்றவும்
        
        try {
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `address=${encodeURIComponent(fullAddress)}`
            });
            console.log("Data sent to Google Sheets");
        } catch (e) {
            console.error("Error!", e.message);
        }

        // 2. லேபிள் தயார் செய்தல்
        const printArea = document.getElementById('printArea');
        printArea.innerHTML = '';
        
        const lines = fullAddress.split('\n');
        const name = lines[0] || "Name";
        const pincodeMatch = fullAddress.match(/\d{6}/); // 6 இலக்க பின்கோடு தேடுதல்
        const pincode = pincodeMatch ? pincodeMatch[0] : "";
        
        // லேபிள் வடிவம்
        const labelHTML = `
            <div class="label-box">
                <div>TO : <span class="bold-text">${name}</span></div>
                <div style="white-space: pre-line;">${fullAddress.split('\n').slice(1).join('\n')}</div>
                <div style="margin-top:5px;">PINCODE: <span class="bold-text">${pincode}</span></div>
            </div>
        `;

        // ஒரு தாளில் 6 லேபிள்கள் வர வைக்க
        for(let i=0; i<6; i++) { printArea.innerHTML += labelHTML; }

        // 3. பிரிண்ட் விண்டோ திறத்தல்
        setTimeout(() => { window.print(); }, 500);
    }
</script>

</body>
</html>
