<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDNET Order Manager</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #128c7e; text-align: center; margin-bottom: 5px; }
        .info { text-align: center; font-size: 14px; color: #555; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        button { width: 100%; background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* கொரியர் லேபிள் டிசைன் */
        #labelArea { display:none; margin-top: 25px; border: 2px solid #000; padding: 15px; background: #fff; width: 100%; max-width: 400px; position: relative; }
        .label-header { border-bottom: 2px solid #000; text-align: center; font-weight: bold; padding-bottom: 5px; margin-bottom: 10px; }
        .label-footer { border-top: 1px solid #000; margin-top: 10px; padding-top: 5px; font-size: 12px; }
        .print-btn { background: #3498db; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>MDNET ORDER PANEL</h2>
    <div class="info">Website: <b>mdnet.site</b> | விஜய்: <b>9488934686</b></div>
    
    <textarea id="orderInput" placeholder="வாட்ஸ்அப் மெசேஜை இங்கே பேஸ்ட் செய்யவும்..."></textarea>
    <button onclick="processOrder()">சீட்டில் சேமி & லேபிள் உருவாக்கு</button>
    <div id="status" style="text-align:center; margin-top:10px;"></div>

    <div id="labelArea">
        <div class="label-header">SHIPPING ADDRESS (MDNET)</div>
        <p><strong>To:</strong> <span id="l_name"></span></p>
        <p><strong>Address:</strong> <span id="l_addr"></span></p>
        <p><strong>Landmark:</strong> <span id="l_land"></span></p>
        <p><strong>State:</strong> <span id="l_state"></span> - <span id="l_pin"></span></p>
        <p><strong>Phone:</strong> <span id="l_ph"></span>, <span id="l_alt"></span></p>
        <div class="label-footer">
            ID: <span id="l_id"></span> | Qty: <span id="l_qty"></span><br>
            <b>Sender: MDNET (9488934686)</b>
        </div>
        <button class="print-btn" onclick="window.print()">லேபிளை பிரிண்ட் எடுக்க</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqjJoroN0I75u2W0gRMogT-zqNvMObmFw9U-pxUd659xYUxdZUucPjX3sgqOFUAJ0Y/exec ";

    function processOrder() {
        const text = document.getElementById('orderInput').value;
        if(!text.trim()) return alert("மெசேஜை உள்ளிடவும்!");

        document.getElementById('status').innerText = "சேமிக்கப்படுகிறது...";

        // லேபிளில் தகவல்களைக் காட்டுதல்
        const getVal = (reg) => (text.match(reg) ? text.match(reg)[1].trim() : "---");
        
        document.getElementById('l_name').innerText = getVal(/Name:\s*(.*)/);
        document.getElementById('l_addr').innerText = getVal(/Address:\s*(.*)/);
        document.getElementById('l_land').innerText = getVal(/Landmark:\s*(.*)/);
        document.getElementById('l_pin').innerText = getVal(/Pincode:\s*(.*)/);
        document.getElementById('l_state').innerText = getVal(/State:\s*(.*)/);
        document.getElementById('l_ph').innerText = getVal(/Mobile:\s*(.*)/);
        document.getElementById('l_alt').innerText = getVal(/Alt Mobile:\s*(.*)/);
        document.getElementById('l_id').innerText = getVal(/Order ID:\s*(.*)/);
        document.getElementById('l_qty').innerText = getVal(/Quantity:\s*(.*)/);

        document.getElementById('labelArea').style.display = "block";

        // Google Sheet-க்கு அனுப்புதல்
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ message: text })
        }).then(() => {
            document.getElementById('status').innerText = "வெற்றிகரமாக சேமிக்கப்பட்டது!";
        });
    }
</script>

</body>
</html>
